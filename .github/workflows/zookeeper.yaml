name: Zookeeper Tests

on:
  workflow_dispatch:
    inputs:
      repository_name:
        description: Zookeeper repository name
        required: false
        type: string
        default: Netcracker/qubership-zookeeper
      service_branch:
        required: false
        type: string
        default: main
      pipeline_branch:
        description: Test pipeline branch name
        type: string
        required: true
        default: main
      runner_type:
        description: Runner type (self-hosted or ubuntu-latest)
        type: string
        required: false
        default: ubuntu-latest
      test_tags:
        description: Override integrationTests.tags (Robot TAGS), e.g. zookeeperNOTtransactional_backup. Empty = template default.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      repository_name:
        description: Zookeeper repository name
        required: false
        type: string
        default: Netcracker/qubership-zookeeper
      service_branch:
        required: false
        type: string
      pipeline_branch:
        description: Test pipeline branch name
        type: string
        required: true
      runner_type:
        description: Runner type (self-hosted or ubuntu-latest)
        type: string
        required: false
        default: ubuntu-latest
      test_tags:
        description: Override integrationTests.tags (Robot TAGS), e.g. zookeeperNOTtransactional_backup. Empty = template default.
        required: false
        type: string
        default: ""
    secrets:
      AWS_S3_ACCESS_KEY_ID:
        required: true
      AWS_S3_ACCESS_KEY_SECRET:
        required: true

env:
  namespace: zookeeper
  test_completion_max_retries: 60
  test_completion_retry_interval: 10s
  service_ready_max_retries: 150
  service_ready_retry_interval: 10s
  path_to_chart: operator/charts/helm/zookeeper-service

jobs:
  prepare:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      versions: ${{ steps.process-versions.outputs.versions }}
      matrix: ${{ steps.process-versions.outputs.matrix }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.service_branch }}
          repository: ${{ inputs.repository_name }}
          path: qubership-zookeeper

      - name: Checkout pipeline
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines

      - name: Get latest tag
        id: get-latest-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if LATEST_TAG=$(gh api repos/${{ inputs.repository_name }}/releases/latest --jq '.tag_name' 2>/dev/null); then
            :
          else
            LATEST_TAG=""
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Process versions file and matrix generation
        id: process-versions
        working-directory: ${{ github.workspace }}/qubership-test-pipelines
        run: |
          chmod +x ./scripts/matrix.sh
          echo "latest_tag(output)='${{ steps.get-latest-tag.outputs.latest_tag }}'"
          echo "service_branch(input)='${{ inputs.service_branch }}'"
          LATEST_TAG="${{ steps.get-latest-tag.outputs.latest_tag }}"
          if [[ -z "$LATEST_TAG" ]]; then
            LATEST_TAG="${{ inputs.service_branch }}"
          fi
          echo "using latest_tag='$LATEST_TAG' config='./workflow-config/zookeeper.yaml'"
          ./scripts/matrix.sh "$LATEST_TAG" ./workflow-config/zookeeper.yaml "${{ inputs.service_branch }}"

  Zookeeper-Test-Cases:
    runs-on: ${{ inputs.runner_type }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.prepare.outputs.matrix) }}
    name: ${{ matrix.test.name }}
    steps:
      # == 01 Start ======= Common pre-steps for all tests =======
      - name: Print job parameters
        run: |
          echo "======== Job parameters ======="
          echo "${{ toJson(matrix.test) }}"

      - name: Checkout pipeline
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines

      - name: Create cluster
        uses: ./qubership-test-pipelines/actions/shared/create_cluster
      # == 01 End ======= Common pre-steps for all tests =======

      - name: Print clean install deployment parameters
        run: cat qubership-test-pipelines/${{ matrix.test.template }}

      # == 02 Start ===== Install Zookeeper [LATEST] =====
      - name: Clean Install Zookeeper ${{ matrix.test.install_version }}
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: zoo_install
        with:
          path_to_template: templates/zookeeper-service/zookeeper_install_APP_k8s.yml
          service_branch: ${{ matrix.test.install_version }}
          deploy_mode: install
          service_name: zookeeper-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.path_to_chart }}
          namespace: zookeeper
          restricted: false
          resource_folder: ""
          test_tags: ${{ inputs.test_tags }}
          atp_storage_username: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}

      - name: Get Installed Zookeeper CRD name
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: install_zoo_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.path_to_chart }}/crds

      - name: Verify Zookeeper installation
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.namespace }}
          test_completion_max_retries: ${{ env.test_completion_max_retries }}
          test_completion_retry_interval: ${{ env.test_completion_retry_interval }}
          service_ready_max_retries: ${{ env.service_ready_max_retries }}
          service_ready_retry_interval: ${{ env.service_ready_retry_interval }}
          crd_list: ${{ steps.install_zoo_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Zookeeper installation
        if: ${{ !cancelled() && steps.zoo_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.namespace }}
          artifact_name: Install_${{ matrix.test.artifact_name }}
          service_branch: ${{ matrix.test.install_version }}
      # == 02 End ===== Install Zookeeper [LATEST] =====

      # == Start ======= Specific steps for S3 =======
      - name: Create S3 bucket
        id: create_bucket
        if: matrix.test.s3 == true && matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/setup_s3_bucket
        with:
          aws_access_key_id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}
          region: us-east-1
          prefix: zookeeper

      - name: Update YAML secrets
        if: matrix.test.sequence == 'upgrade' && matrix.test.s3 == true
        run: |
          python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/templates/zookeeper-service/zookeeper_install_s3_APP_k8s.yml' \
            --path='backupDaemon/s3/keyId' \
            --value='${{secrets.AWS_S3_ACCESS_KEY_ID}}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/templates/zookeeper-service/zookeeper_install_s3_APP_k8s.yml' \
            --path='backupDaemon/s3/keySecret' \
            --value='${{secrets.AWS_S3_ACCESS_KEY_SECRET}}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/templates/zookeeper-service/zookeeper_install_s3_APP_k8s.yml' \
            --path='backupDaemon/s3/bucket' \
            --value="${{ steps.create_bucket.outputs.bucket_name }}"

      - name: Print s3 template
        if: matrix.test.sequence == 'upgrade' && matrix.test.s3 == true
        run: cat qubership-test-pipelines/templates/zookeeper-service/zookeeper_install_s3_APP_k8s.yml
      # == End ======= Specific steps for S3 =======

      # == Start Spetial TLS Upgrade step =============================
      - name: Install cert-manager
        if: matrix.test.sequence == 'upgrade' && matrix.test.tls == true
        run: |
          # Install cert-manager
          echo "::group::Install cert-manager"
          helm repo add jetstack https://charts.jetstack.io --force-update
          helm upgrade --install cert-manager jetstack/cert-manager --namespace cert-manager \
            --create-namespace --version v1.16.3 --set prometheus.enabled=true   --set crds.enabled=true
          echo "::endgroup::"
          echo "::group::Create cert-manager entities"
          kubectl apply -f qubership-test-pipelines/resources/test-issuer.yaml
          sleep 10s
          kubectl apply -f qubership-test-pipelines/resources/test-certificate.yaml
          sleep 10s
          kubectl apply -f qubership-test-pipelines/resources/test-clusterissuer.yaml
          echo "::endgroup::"
          echo "::group::Get cert-manager resources"
          kubectl get pods -n cert-manager
          kubectl get secrets -n cert-manager
          kubectl get certificates -A
          echo "::endgroup::"
          echo "::group:: Get clusterissuer"
          kubectl get clusterissuer
          kubectl get clusterissuer test-clusterissuer -o yaml
          echo "::endgroup::"
      # == End Spetial TLS Upgrade step =============================


      - name: Print update deployment parameters
        run: cat qubership-test-pipelines/${{ matrix.test.template }}

      # == 03 Start === Upgrade Zookeeper [LATEST] =====
      - name: Update to [${{ matrix.test.upgrade_version }}] Version
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: zoo_upgrade
        with:
          # combined 2 cases: update params + rollingupdate
          path_to_template: ${{ matrix.test.upgrade_template }}
          service_branch: ${{ matrix.test.upgrade_version }}
          deploy_mode: upgrade
          service_name: zookeeper-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.path_to_chart }}
          namespace: zookeeper
          restricted: false
          resource_folder: ""
          test_tags: ${{ inputs.test_tags }}
          atp_storage_username: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}

      - name: Get Upgraded Zookeeper CRD name
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: upgrade_zoo_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.path_to_chart }}/crds

      - name: Sleep 1m
        if: matrix.test.sequence == 'upgrade'
        run: sleep 1m

      - name: Verify Zookeeper upgrade
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.namespace }}
          test_completion_max_retries: ${{ env.test_completion_max_retries }}
          test_completion_retry_interval: ${{ env.test_completion_retry_interval }}
          service_ready_max_retries: ${{ env.service_ready_max_retries }}
          service_ready_retry_interval: ${{ env.service_ready_retry_interval }}
          crd_list: ${{ steps.upgrade_zoo_get_crds.outputs.crd_names }}

      # == Start ======= Specific steps for S3 =======
      - name: Delete S3 bucket
        if: always() && matrix.test.s3 == true
        uses: ./qubership-test-pipelines/actions/shared/cleanup_s3_bucket
        with:
          aws_access_key_id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}
          bucket_name: ${{ steps.create_bucket.outputs.bucket_name }}
          region: us-east-1
      # == End ======= Specific steps for S3 =======

      - name: Collect Diagnostics Zookeeper Upgrade
        if: ${{ !cancelled() && steps.zoo_upgrade.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.namespace }}
          artifact_name: Upgrade_${{ matrix.test.artifact_name }}
          service_branch: ${{ matrix.test.upgrade_version }}
      # == 03 End === Upgrade Zookeeper [LATEST] =====

#############################################################################
#                                                                           #
#############################################################################

  # 15-Clean [LATEST] TLS
  Clean-Latest-TLS:
    runs-on: ${{inputs.runner_type}}
    name: Clean [${{ inputs.service_branch }}] TLS
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@v5
        with:
          ref: ${{inputs.pipeline_branch}}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
      - name: Create cluster
        uses: ./qubership-test-pipelines/actions/shared/create_cluster
      - name: Install cert-manager
        # language=bash
        run: |
          helm repo add jetstack https://charts.jetstack.io --force-update
          helm upgrade --install cert-manager jetstack/cert-manager --namespace cert-manager \
            --create-namespace --version v1.16.3 --set prometheus.enabled=true   --set crds.enabled=true
      - name: Create cert-manager entities
        # language=bash
        run: |
          kubectl apply -f qubership-test-pipelines/resources/test-issuer.yaml
          sleep 10s
          kubectl apply -f qubership-test-pipelines/resources/test-certificate.yaml
          sleep 10s
          kubectl apply -f qubership-test-pipelines/resources/test-clusterissuer.yaml
      - name: Get cert-manager resources
        # language=bash
        run: |
          kubectl get pods -n cert-manager
          kubectl get secrets -n cert-manager
          kubectl get certificates -A
      - name: Get clusterissuer
        # language=bash
        run: |
          kubectl get clusterissuer
          kubectl get clusterissuer test-clusterissuer -o yaml
      - name: Install Zookeeper [${{ inputs.service_branch }}] TLS
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: zoo_install_tls
        with:
          path_to_template: templates/zookeeper-service/zookeeper_install_tls_APP_k8s.yml
          service_branch: ${{ inputs.service_branch }}
          deploy_mode: install
          service_name: zookeeper-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.path_to_chart }}
          namespace: zookeeper
          restricted: false
          resource_folder: ""
          test_tags: ${{ inputs.test_tags }}
          atp_storage_username: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}

      - name: Get Installed Zookeeper CRD name
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: install_zoo_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.path_to_chart }}/crds

      - name: Verify Zookeeper installation
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.namespace }}
          test_completion_max_retries: ${{ env.test_completion_max_retries }}
          test_completion_retry_interval: ${{ env.test_completion_retry_interval }}
          service_ready_max_retries: ${{ env.service_ready_max_retries }}
          service_ready_retry_interval: ${{ env.service_ready_retry_interval }}
          crd_list: ${{ steps.install_zoo_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Zookeeper installation
        if: ${{ !cancelled() && steps.zoo_install_tls.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.namespace }}
          artifact_name: Install_tls_${{inputs.service_branch}}
          service_branch: ${{inputs.service_branch}}

      - name: Get Zookeeper Certs
        uses: ./qubership-test-pipelines/actions/shared/get_certs
        with:
          service_name: zookeeper
          secret_name: zookeeper-tls-secret
          namespace: zookeeper
      - name: Get Backup-Daemon Certs
        uses: ./qubership-test-pipelines/actions/shared/get_certs
        with:
          service_name: zookeeper
          secret_name: zookeeper-backup-daemon-tls-secret
          namespace: zookeeper
      - name: Copy certs to artifacts
        # language=bash
        run: |
          mkdir -p certs_artifacts
          cp ${{runner.temp}}/zookeeper-tls-secret_*.txt certs_artifacts/
          cp ${{runner.temp}}/zookeeper-backup-daemon-tls-secret_*.txt certs_artifacts/
      - name: Upload certs artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zookeeper-certs
          path: certs_artifacts
          retention-days: 1

  # 16-Clean [LATEST] TLS Secrets
  Clean-Latest-TLS-Secrets:
    runs-on: ${{ inputs.runner_type }}
    needs: Clean-Latest-TLS
    name: Clean [${{ inputs.service_branch }}] TLS Secrets
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
      - name: Create cluster
        uses: ./qubership-test-pipelines/actions/shared/create_cluster
      - name: Download zookeeper certs artifacts
        uses: actions/download-artifact@v4
        with:
          name: zookeeper-certs
          path: certs_artifacts
      - name: Update secrets
        uses: ./qubership-test-pipelines/actions/zookeeper/add_certs_to_secrets
      - name: Clean Install Zookeeper [${{ inputs.service_branch }}] TLS Secrets
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: zoo_install_tls_secrets
        with:
          path_to_template: templates/zookeeper-service/zookeeper_install_tls_secrets.yml
          service_branch: ${{ inputs.service_branch }}
          resource_folder: resources/zookeeper
          deploy_mode: install
          service_name: zookeeper-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.path_to_chart }}
          namespace: zookeeper
          restricted: false
          test_tags: ${{ inputs.test_tags }}
          atp_storage_username: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}

      - name: Get Installed Zookeeper CRD name
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: install_zoo_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.path_to_chart }}/crds

      - name: Verify Zookeeper installation
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.namespace }}
          test_completion_max_retries: ${{ env.test_completion_max_retries }}
          test_completion_retry_interval: ${{ env.test_completion_retry_interval }}
          service_ready_max_retries: ${{ env.service_ready_max_retries }}
          service_ready_retry_interval: ${{ env.service_ready_retry_interval }}
          crd_list: ${{ steps.install_zoo_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Zookeeper installation
        if: ${{ !cancelled() && steps.zoo_install_tls_secrets.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.namespace }}
          artifact_name: Install_tls_secrets_${{inputs.service_branch}}
          service_branch: ${{ inputs.service_branch }}

  # 17-Upgrade [LATEST] TLS Certificates -> Clean [LATEST] TLS Certificates
  Clean-Latest-TLS-Certificates:
    runs-on: ${{ inputs.runner_type }}
    needs: Clean-Latest-TLS
    name: Clean [${{ inputs.service_branch }}] TLS Certificates
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
      - name: Create cluster
        uses: ./qubership-test-pipelines/actions/shared/create_cluster
      - name: Download certs artifacts
        uses: actions/download-artifact@v4
        with:
          name: zookeeper-certs
          path: certs_artifacts
      - name: Update template
        uses: ./qubership-test-pipelines/actions/zookeeper/add_certs_to_template
      - name: Print template
        run: cat qubership-test-pipelines/templates/zookeeper-service/zookeeper_install_tls_certs.yml
      - name: Clean Zookeeper [${{ inputs.service_branch }}] TLS Certificates
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: zoo_install_tls_cert
        with:
          path_to_template: templates/zookeeper-service/zookeeper_install_tls_certs.yml
          service_branch: ${{ inputs.service_branch }}
          deploy_mode: install
          service_name: zookeeper-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.path_to_chart }}
          namespace: zookeeper
          restricted: false
          resource_folder: ""
          test_tags: ${{ inputs.test_tags }}
          atp_storage_username: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}

      - name: Get Installed Zookeeper CRD name
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: install_zoo_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.path_to_chart }}/crds

      - name: Verify Zookeeper installation
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.namespace }}
          test_completion_max_retries: ${{ env.test_completion_max_retries }}
          test_completion_retry_interval: ${{ env.test_completion_retry_interval }}
          service_ready_max_retries: ${{ env.service_ready_max_retries }}
          service_ready_retry_interval: ${{ env.service_ready_retry_interval }}
          crd_list: ${{ steps.install_zoo_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Zookeeper installation
        if: ${{ !cancelled() && steps.zoo_install_tls_cert.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.namespace }}
          artifact_name: Install_tls_cert_${{inputs.service_branch}}
          service_branch: ${{ inputs.service_branch }}

  final-status-check:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [Zookeeper-Test-Cases, Clean-Latest-TLS-Certificates, Clean-Latest-TLS-Secrets]
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
      - name: Check Zookeeper-Test-Cases job status
        uses: ./qubership-test-pipelines/actions/shared/check_job_status
        with:
          job_result: ${{ needs.Zookeeper-Test-Cases.result }}
      - name: Check Clean-Latest-TLS-Certificates job status
        uses: ./qubership-test-pipelines/actions/shared/check_job_status
        with:
          job_result: ${{ needs.Clean-Latest-TLS-Certificates.result }}
      - name: Check Clean-Latest-TLS-Secrets job status
        uses: ./qubership-test-pipelines/actions/shared/check_job_status
        with:
          job_result: ${{ needs.Clean-Latest-TLS-Secrets.result }}
