name: Helm deploy Action
description: GitHub Action to install/upgrade services using Helm
inputs:
  deploy_mode:
    description: |
      Deployment mode:
      - 'install' for clean installation
      - 'upgrade' to upgrade an existing release
    required: true
    default: install

  restricted:
    description: |
      - 'true': helm installation by user with restricted rights
      - 'false': helm installation by cluster admin user
    required: true
    default: false
    type: boolean

  path_to_template:
    description: |
      Path to template file in qubership-test-pipelines repository
      Example: 'templates/consul-service/consul_clean_infra_passport.yml'
    required: true

  service_branch:
    description: |
      Branch in service repository
    required: true

  service_name:
    description: |
      Helm release name
    required: true

  repository_name:
    description: |
      Service repository name
      Example: 'Netcracker/qubership-consul' for https://github.com/Netcracker/qubership-consul
    required: true

  path_to_chart:
    description: |
      Path to helm chart within service repository
      Example: 'charts/helm/consul-service'
    required: true

  namespace:
    description: |
      Kubernetes namespace for service installation
    required: true

  resource_folder:
    description: |
      Folder with resources for creating before installation
    required: true

  image_replacement:
    description: |
      Value for change version of service in chart(example - pgskipper-docker-patroni-18)
    required: false
    type: string
    default: ""

  test_tags:
    description: |
      Test tags
    required: true
    default: ""

  atp_storage_username:
    description: |
      Optional value for Helm integrationTests.atpReport.atpStorage.username (e.g. S3 access key).
      Pass from workflow secrets; leave empty to use only values from -f template.
    required: false
    default: ""

  atp_storage_password:
    description: |
      Optional value for Helm integrationTests.atpReport.atpStorage.password (e.g. S3 secret key).
    required: false
    default: ""


runs:
  using: composite
  steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        ref: ${{inputs.service_branch}}
        repository: ${{inputs.repository_name}}
        path: ${{inputs.repository_name}}

    - name: Create namespace
      if: inputs.deploy_mode == 'install'
      shell: bash
      # language=bash
      run: |
        # ▶️ Create namespace
        if ! kubectl get namespace ${{inputs.namespace}} >/dev/null 2>&1; then
        kubectl create namespace ${{inputs.namespace}}
        else
        echo "Namespace '${{inputs.namespace}}' already exists"
        fi

    - name: Create resources
      if: inputs.resource_folder != ''
      shell: bash
      # language=bash
      run: |
        # ▶️ Create resources
        folder="qubership-test-pipelines/${{inputs.resource_folder}}"
        files=($(find "$folder" -type f))
        echo $files
        for file in "${files[@]}"; do
          echo "Applying $file"
          kubectl create -f "$file"
        done

    - name: Replace CRDs
      shell: bash
      # language=bash
      run: |
        # ▶️ Replace CRDs
        cd "${{inputs.repository_name}}/${{inputs.path_to_chart}}"
        if [ -d "./crds" ]; then
          echo "CRDs directory exists"
          for file in ./crds/*; do
            if [ -f "$file" ]; then
              echo "Processing file: $file"
              CRD_NAME=$(yq e '.metadata.name' "$file" 2>/dev/null)

              if [ -z "$CRD_NAME" ]; then
                echo "::error::Could not extract CRD name from $file"
                exit 1
              fi

              echo "Found CRD: $CRD_NAME"
              if kubectl get crd "$CRD_NAME" > /dev/null 2>&1; then
                  echo "CRD $CRD_NAME already exists. Updating..."
                  kubectl replace -f $file
              else
                  echo "CRD $CRD_NAME doesn't exist. Creating..."
                  kubectl create -f $file
              fi
            fi
          done
        else
          echo "::error::Directory with CRDs not found!"
          exit 1
        fi

    - name: Create restricted resources
      if: inputs.restricted == 'true'  && inputs.deploy_mode == 'install'
      uses: ./qubership-test-pipelines/actions/shared/create_restricted_resources
      with:
        service_name: ${{inputs.service_name}}
        repository_name: ${{inputs.repository_name}}
        path_to_chart: ${{inputs.path_to_chart}}
        namespace: ${{inputs.namespace}}

    - name: Copy template
      shell: bash
      # language=bash
      run: |
        # ▶️ Copy template
        cp qubership-test-pipelines/${{inputs.path_to_template}} ${{inputs.repository_name}}/${{inputs.path_to_chart}}

    - name: Check if version is release
      id: check-release
      shell: bash
      # language=bash
      run: |
        # ▶️ Check if version is release
        if [[ "${{inputs.service_branch}}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "${{inputs.service_branch}} is release version"
          echo "is_release=true" >> $GITHUB_OUTPUT
        else
          echo "${{inputs.service_branch}} is not release version"
          echo "is_release=false" >> $GITHUB_OUTPUT
        fi

    - name: Replace slash in service branch
      id: replace_slash
      shell: bash
      # language=bash
      run: |
        # ▶️ Replace slash in service branch
        service_branch="${{ inputs.service_branch }}"
        # if branch is a commit hash (contains from 7 up to 40 characters: digits or letters from a to f), trim to 11 characters
        if echo "$service_branch" | grep -Eq '^[0-9a-f]{7,40}$'; then
          service_branch_updated="git-${service_branch:0:7}"
        else
          service_branch_updated="${service_branch//\//_}"
        fi
        echo "The image tag: ${service_branch_updated}"
        echo "service_branch_updated=${service_branch_updated}" >> $GITHUB_OUTPUT

    - name: Update Image Version
      if: inputs.image_replacement != ''
      shell: bash
      run: |
        # ▶️ Replace version of service
        path_to_file="${{inputs.repository_name}}/${{inputs.path_to_chart}}/values.yaml"
        new_image="${{ inputs.image_replacement }}"
        base="${new_image%-*}"
        if [ ! -f "$path_to_file" ]; then echo "::error::File not found: $path_to_file"; exit 1; fi
        current_image=$(grep -oE "${base}-[^:\"' ]+" "$path_to_file" | head -n 1)
        if [ -z "$current_image" ]; then
          echo "::error::Target pattern '${base}-...' not found in $path_to_file"; exit 1
        fi
        if [ "$current_image" == "$new_image" ]; then
          echo "ℹ️  Value is already set to: $current_image. No changes needed."
        else
          echo "🔄 Updating: $current_image -> $new_image"
          sed -i -E "s|${base}-[^:\"' ]+|${new_image}|g" "$path_to_file"
          if grep -Fq "$new_image" "$path_to_file"; then
             echo "✅ Success: Replaced $current_image with $new_image"
          else
             echo "::error::Sed executed but verification failed."; exit 1
          fi
        fi

    - name: echo tags
      shell: bash
      run: |
        # ▶️ Echo tags
        new_tags="${{ inputs.test_tags }}"
        echo $new_tags


    - name: Update Test Tags
      if: inputs.test_tags != ''
      shell: bash
      run: |
        # ▶️ Update Test Tags
        template_name=$(basename "${{ inputs.path_to_template }}")
        echo "Template file: $template_name"
        cd "${{ inputs.repository_name }}/${{ inputs.path_to_chart }}"
        file="$template_name"
        new_tags="${{ inputs.test_tags }}"
        current_tags=$(grep -E '^[[:space:]]*tags:[[:space:]]*' "$file" | head -n1 | sed -E 's/^[[:space:]]*tags:[[:space:]]*//; s/^"//; s/"$//')
        if [ -z "$current_tags" ]; then
          echo "::warning::No 'tags' field found in $file – nothing to update."
          exit 0
        fi
        if [ "$current_tags" = "$new_tags" ]; then
          echo "ℹ️ $file: tags already set to '$current_tags'. No changes needed."
        else
          echo "🔄 $file: replacing '$current_tags' tags -> '$new_tags' tags"
          sed -i -E 's/^([[:space:]]*tags:[[:space:]]*).*/\1'"$new_tags"'/' "$file"
          if grep -qE '^[[:space:]]*tags:[[:space:]]*'"$new_tags" "$file"; then
            echo "✅ $file: successfully updated"
          else
            echo "::error::Failed to update $file"
            exit 1
          fi
        fi

    - name: Update versions in values
      id: update-versions
      if: ${{ steps.check-release.outputs.is_release == 'false' }}
      uses: netcracker/qubership-workflow-hub/actions/charts-values-update-action@d558e10a6537924292e7dd7ff4109c2bda9b406e # v2.0.5
      with:
        release-version: ${{steps.replace_slash.outputs.service_branch_updated}}
        config-file: .github/charts-values-update-config.yaml
        create-release-branch: false
        version-replace-method: parse
        working-directory: ${{inputs.repository_name}}
        chart-version: ${{github.run_number}}.${{github.run_attempt}}.${{github.run_id}}
        default-tag: main

    - name: Align container images for branch builds
      if: steps.check-release.outputs.is_release == 'false'
      shell: bash
      # language=bash
      run: |
        # ▶️ Fork dev_build publishes ghcr.io/<owner>/...:<branch_tag>; values.yaml defaults to netcracker:main
        values_file="${{ inputs.repository_name }}/${{ inputs.path_to_chart }}/values.yaml"
        tag="${{ steps.replace_slash.outputs.service_branch_updated }}"
        repo_owner=$(echo "${{ inputs.repository_name }}" | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')

        if [[ ! -f "$values_file" ]]; then
          echo "::error::values file not found: $values_file"
          exit 1
        fi

        if [[ "$repo_owner" != "netcracker" ]]; then
          echo "Rewriting image registry for fork: netcracker -> ${repo_owner}"
          sed -i "s|ghcr.io/netcracker/|ghcr.io/${repo_owner}/|g" "$values_file"
        fi

        echo "Setting ghcr.io/${repo_owner}/* image tags to branch build tag: ${tag}"
        sed -i -E "s|(ghcr.io/${repo_owner}/[^:\"'[:space:]]+):main|\1:${tag}|g" "$values_file"
        sed -i -E "s|(ghcr.io/${repo_owner}/[^:\"'[:space:]]+):latest|\1:${tag}|g" "$values_file"

        echo "::group::Container images in values.yaml (after branch align)"
        grep -E 'ghcr\.io/' "$values_file" | grep -v '^[[:space:]]*#' | head -50 || true
        echo "::endgroup::"

    - name: Install/update service with helm
      shell: bash
      env:
        ATP_SET_USER: ${{ inputs.atp_storage_username }}
        ATP_SET_PASS: ${{ inputs.atp_storage_password }}
      # language=bash
      run: |
        # ▶️ ${{inputs.deploy_mode}} ${{inputs.service_name}} with Helm
        template_name=$(basename "${{inputs.path_to_template}}")
        echo "$template_name"
        cd ${{inputs.repository_name}}/${{inputs.path_to_chart}}
        extras=()
        if [[ -n "${ATP_SET_USER}" ]]; then
          extras+=(--set-string)
          extras+=("integrationTests.atpReport.atpStorage.username=${ATP_SET_USER}")
        fi
        if [[ -n "${ATP_SET_PASS}" ]]; then
          extras+=(--set-string)
          extras+=("integrationTests.atpReport.atpStorage.password=${ATP_SET_PASS}")
        fi
        if [[ "${{inputs.restricted}}" == "false" ]]; then
          helm ${{inputs.deploy_mode}} ${{inputs.service_name}} . -f "$template_name" -n ${{inputs.namespace}} --timeout 10m "${extras[@]}"
        else
          helm ${{inputs.deploy_mode}} ${{inputs.service_name}} . -f "$template_name" -n ${{inputs.namespace}} --timeout 10m --skip-crds "${extras[@]}"
        fi

    - name: Get docker images
      shell: bash
      # language=bash
      run: |
        # ▶️ Get docker images
        kubectl get pods -n ${{inputs.namespace}} -o go-template --template="{{range .items}}{{range .spec.containers}}{{.image}} {{end}}{{end}}"

    - name: Use default context
      if: inputs.restricted == 'true'
      shell: bash
      # language=bash
      run: kubectl config use-context kind-kind

    - name: Get resources after deploy
      if: always()
      shell: bash
      # language=bash
      run: |
        # ▶️ Get resources after deploy
        kubectl get all -n ${{inputs.namespace}}
