global:
  enabled: true
server:
  replicas: 3
  bootstrapExpect: 3
  storage: 1Gi
  storageClass: standard
consulAclConfigurator:
  enabled: true
dns:
  enabled: false
monitoring:
  enabled: true
ui:
  enabled: true
  ingress:
    enabled: true
    hosts:
      - host: consul-service.qa-kubernetes.openshift.sdntest.qubership.org
service:
  enabled: true
client:
  enabled: true
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 256Mi
      cpu: 25m
backupDaemon:
  enabled: true
  storage: 1Gi
  storageClass: standard
  backupSchedule: "*/15 * * * *"
  evictionPolicy: 1h/1d,7d/delete
integrationTests:
  enabled: true
  tags: backupORcrudORalertsORha
  prometheusUrl: http://vmsingle-k8s.monitoring:8429
  atpReport:
    enabled: true
    atpStorage:
      provider: aws
      serverUrl: https://s3.amazonaws.com
      bucket: qstp-consul
      region: us-east-1
      username: ""
      password: ""

statusProvisioner:
  lifetimeAfterCompletion: 120
  integrationTestsTimeout: 600
  podReadinessTimeout: 900
